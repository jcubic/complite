name: Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'api/**'
      - 'scripts/**'
      - '.eleventy.js'
      - 'package.json'
      - 'package-lock.json'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/deploy.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    if: github.repository == 'jcubic/complite'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint

  deploy:
    if: github.repository == 'jcubic/complite'
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Validate social card SVG
        run: |
          sudo apt-get install -y libxml2-utils
          node scripts/validate-social-card.mjs

      - name: Build
        run: npm run build

      - name: Validate JSON-LD
        run: node scripts/validate-jsonld.mjs

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: tar -czf - -C ./_site . | ssh  -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_SERVER }} "cd ${{ secrets.SSH_PATH }} && tar -xzf -"
